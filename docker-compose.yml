version: "3.8"

services:
  backend:
    build: ./app/backend
    container_name: todo-backend
    ports:
      - "8000:8000"
    env_file:
      - ./app/backend/.env
    networks:
      - todo-network
    restart: always

  frontend:
    build: 
      context: ./app/frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: todo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - todo-network
    restart: always

networks:
  todo-network:
    external: true