- name: Setup and deploy MERN application
  hosts: hosts_list
  become: true
  vars:
    JWT_SECRET: "your_jwt_secret_key"
    GMAIL_USERNAME: "your_gmail_username"
    GMAIL_PASSWORD: "your_gmail_password"
    SERVER_DOMAIN: "your_server_domain"
    SERVER_IP: "your_server_ip"
    ALERT_EMAIL: "your_gmail_username"
    ALERT_EMAIL_PASSWORD: "your_gmail_password"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - git
          - docker.io
          - docker-compose-v2
          - python3-docker
        state: present

    - name: Start docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Create docker network
      docker_network:
        name: todo-network
        state: present

    - name: Create Mongo volume
      docker_volume:
        name: mongo-data

    - name: Run MongoDB container
      docker_container:
        name: todo-mongo
        image: mongo:7
        state: started
        restart_policy: always
        networks:
          - name: todo-network
        volumes:
          - mongo-data:/data/db

    - name: Copy GitHub deploy key to server
      copy:
        src: /root/ansible/server_ssh_key
        dest: /root/.ssh/server_ssh_key
        mode: "0600"

    - name: Configure SSH for GitHub access
      copy:
        dest: /root/.ssh/config
        content: |
          Host github.com
            HostName github.com
            User git
            IdentityFile /root/.ssh/server_ssh_key
        mode: "0600"

    - name: Pull code from private GitHub repository
      git:
        repo: "git@github.com:thientr18/mern-todo-devops.git"
        dest: /root/mern-todo-app
        version: main
        key_file: /root/.ssh/server_ssh_key
        accept_hostkey: yes

    - name: Create backend .env
      copy:
        dest: /root/mern-todo-app/app/backend/.env
        content: |
          MONGO_URI=mongodb://todo-mongo:27017/todo
          PORT=8000
          JWT_SECRET={{ JWT_SECRET }}
          GMAIL_USERNAME={{ GMAIL_USERNAME }}
          GMAIL_PASSWORD={{ GMAIL_PASSWORD }}
          SERVER_DOMAIN={{ SERVER_DOMAIN }}
          SERVER_IP={{ SERVER_IP }}
        mode: "0600"

    - name: Deploy with docker compose
      community.docker.docker_compose_v2:
        project_src: /root/mern-todo-app
        state: present
        build: always
        remove_orphans: true

    - name: Run Jenkins container
      docker_container:
        name: jenkins
        image: jenkins/jenkins:lts
        state: started
        restart_policy: always
        networks:
          - name: todo-network
        ports:
          - "8080:8080"
          - "50000:50000"

    - name: Run Prometheus container
      docker_container:
        name: prometheus
        image: prom/prometheus:v2.51.0
        state: started
        restart_policy: always
        networks:
          - name: todo-network
        healthcheck:
          test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
          interval: 30s
          timeout: 10s
          retries: 3
        memory: 512m
        volumes:
          - /root/mern-todo-app/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
          - /root/mern-todo-app/prometheus/rules:/etc/prometheus/rules

    - name: Run Grafana container
      docker_container:
        name: grafana
        image: grafana/grafana:10.4.2
        state: started
        restart_policy: always
        user: "472"
        memory: 512m
        networks:
          - name: todo-network
        ports:
          - "3000:3000"

    - name: Run Node Exporter container
      docker_container:
        name: host-node-exporter
        image: prom/node-exporter:v1.8.1
        state: started
        restart_policy: always
        networks:
          - name: todo-network

    - name: Run Blackbox Exporter container
      docker_container:
        name: host-blackbox
        image: prom/blackbox-exporter:v0.25.0
        state: started
        restart_policy: always
        networks:
          - name: todo-network

    - name: Create alertmanager configuration
      copy:
        dest: /root/mern-todo-app/alertmanager/alertmanager.yml
        content: |
          route:
            receiver: email-alert

          receivers:
          - name: email-alert
            email_configs:
            - to: {{ ALERT_EMAIL }}
              from: {{ ALERT_EMAIL }}
              smarthost: smtp.gmail.com:587
              auth_username: {{ ALERT_EMAIL }}
              auth_identity: {{ ALERT_EMAIL }}
              auth_password: {{ ALERT_EMAIL_PASSWORD }}
        mode: "0644"

    - name: Run Alertmanager container
      docker_container:
        name: alertmanager
        image: prom/alertmanager:v0.27.0
        state: started
        restart_policy: always
        networks:
          - name: todo-network
        volumes:
          - /root/mern-todo-app/alertmanager:/etc/alertmanager

    - name: Clean unused docker images
      community.docker.docker_prune:
        images: true