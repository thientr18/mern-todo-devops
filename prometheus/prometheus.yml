global:
  scrape_interval: 15s
  
rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets:
        - localhost:9090

  - job_name: node-exporter
    static_configs:
    - targets:
      - host-node-exporter:9100

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]

    static_configs:
    - targets:
      - https://todo.tran-thien.id.vn

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: host-blackbox:9115